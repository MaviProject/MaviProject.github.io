<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | MaviProject 技术博客</title>
    <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
    
    <!-- 共用样式 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --light: #f8fafc;
            --gray: #94a3b8;
            --gray-light: #e2e8f0;
            
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 文章头部 */
        .article-header {
            padding: 120px 0 60px;
            text-align: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(6, 182, 212, 0.05));
            border-bottom: 1px solid var(--glass-border);
        }
        
        .article-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        
        .article-meta {
            color: var(--gray);
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        
        /* 文章内容 */
        .article-content {
            padding: 60px 0;
            font-size: 1.1rem;
        }
        
        .article-content h2 {
            font-size: 1.8rem;
            margin: 2.5rem 0 1rem;
            color: var(--light);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.5rem;
        }
        
        .article-content h3 {
            font-size: 1.4rem;
            margin: 2rem 0 1rem;
            color: var(--light);
        }
        
        .article-content p {
            margin: 1.5rem 0;
        }
        
        .article-content code {
            background: var(--dark-light);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
        
        .article-content pre {
            background: var(--dark-light);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid var(--glass-border);
        }
        
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
            box-shadow: var(--shadow);
        }
        
        /* 导航按钮 */
        .article-nav {
            display: flex;
            justify-content: space-between;
            margin: 3rem 0;
            padding: 2rem 0;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--light);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .nav-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        
        /* 评论区域 */
        .comments-section {
            padding: 60px 0;
        }
        
        .comments-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }
            
            .article-content {
                font-size: 1rem;
                padding: 40px 0;
            }
            
            .article-content h2 {
                font-size: 1.5rem;
            }
            
            .article-content h3 {
                font-size: 1.2rem;
            }
            
            .article-nav {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 阅读进度条 -->
    <div id="reading-progress-bar"></div>
    
    <!-- 文章头部 -->
    <header class="article-header">
        <div class="container">
            <h1 class="article-title">{{ page.title }}</h1>
            <div class="article-meta">
                <span><i class="fas fa-calendar"></i> {{ page.date | date: "%Y年%m月%d日" }}</span>
                <span><i class="fas fa-clock"></i> {{ page.read-time | default: "10分钟" }}阅读</span>
                <span><i class="fas fa-tag"></i> {{ page.category | default: "技术" }}</span>
            </div>
        </div>
    </header>
    
    <!-- 文章内容 -->
    <main class="article-content">
        <div class="container">
            {{ content }}
        </div>
    </main>
    
    <!-- 文章导航 -->
    <div class="container">
        <div class="article-nav">
            <a href="/" class="nav-btn">
                <i class="fas fa-home"></i>
                返回首页
            </a>
            <a href="#comments" class="nav-btn">
                <i class="fas fa-comments"></i>
                发表评论
            </a>
        </div>
    </div>
    
    <!-- 评论区域 -->
    <section class="comments-section" id="comments">
        <div class="container">
            <h2 class="comments-title">
                <i class="fas fa-comment-dots"></i>
                评论与讨论
            </h2>
            <div id="giscus-comments"></div>
        </div>
    </section>
    
    <!-- 脚本 -->
    <script src="/assets/js/reading-progress.js"></script>
    
    <!-- Giscus评论系统 -->
    <script>
        // Giscus配置（需要从giscus.app获取实际配置）
        const giscusConfig = {
            repo: 'MaviProject/MaviProject.github.io',
            repoId: '', // 需要填写
            category: 'Announcements',
            categoryId: '', // 需要填写
            mapping: 'pathname',
            strict: '0',
            reactionsEnabled: '1',
            emitMetadata: '0',
            inputPosition: 'bottom',
            theme: 'dark',
            lang: 'zh-CN',
            crossorigin: 'anonymous',
            async: true
        };
        
        // 动态加载Giscus
        function loadGiscus() {
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', giscusConfig.repo);
            script.setAttribute('data-repo-id', giscusConfig.repoId);
            script.setAttribute('data-category', giscusConfig.category);
            script.setAttribute('data-category-id', giscusConfig.categoryId);
            script.setAttribute('data-mapping', giscusConfig.mapping);
            script.setAttribute('data-strict', giscusConfig.strict);
            script.setAttribute('data-reactions-enabled', giscusConfig.reactionsEnabled);
            script.setAttribute('data-emit-metadata', giscusConfig.emitMetadata);
            script.setAttribute('data-input-position', giscusConfig.inputPosition);
            script.setAttribute('data-theme', giscusConfig.theme);
            script.setAttribute('data-lang', giscusConfig.lang);
            script.crossOrigin = giscusConfig.crossorigin;
            script.async = giscusConfig.async;
            
            document.getElementById('giscus-comments').appendChild(script);
        }
        
        // 页面加载后初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (giscusConfig.repoId) {
                loadGiscus();
            } else {
                document.getElementById('giscus-comments').innerHTML = 
                    '<p style="color: var(--gray); text-align: center; padding: 2rem;">评论系统配置中...</p>';
            }
        });
    </script>
</body>
</html>

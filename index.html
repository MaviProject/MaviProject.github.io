---
layout: null
---
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaviProject | 未来科技技术博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #bc13fe;
            --accent: #ff00de;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-dark: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 极简未来背景 */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 80%);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* 顶部导航 */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
        }

        nav { display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.5rem; color: var(--primary); text-decoration: none; letter-spacing: 2px; }
        
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-item { position: relative; cursor: pointer; }
        .nav-link { text-decoration: none; color: var(--text-main); font-weight: 500; transition: var(--transition); }
        .nav-link:hover { color: var(--primary); }

        .dropdown {
            position: absolute; top: 100%; left: 0; background: var(--bg-dark);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 8px;
            min-width: 150px; display: none; padding: 10px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { display: block; padding: 10px 20px; color: var(--text-main); text-decoration: none; font-size: 0.9rem; }
        .dropdown a:hover { background: rgba(0, 242, 255, 0.1); color: var(--primary); }

        /* Hero 区域 */
        .hero { padding: 150px 0 60px; text-align: center; }
        .hero-title { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900; margin-bottom: 15px; 
                      background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-desc { color: var(--text-dim); max-width: 600px; margin: 0 auto; font-size: 1.1rem; }

        /* 技术栈 - 横向排列 */
        .tech-section { padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .tech-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .tech-tag { padding: 8px 16px; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); 
                    border-radius: 20px; font-size: 0.85rem; color: var(--primary); display: flex; align-items: center; gap: 8px; transition: var(--transition); }
        .tech-tag:hover { background: var(--primary); color: var(--bg-dark); transform: translateY(-2px); }

        /* 瀑布流文章 */
        .section-title { font-family: 'Orbitron', sans-serif; margin-bottom: 30px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(0, 242, 255, 0.2); }

        .masonry { column-count: 3; column-gap: 25px; padding: 20px 0; }
        @media (max-width: 992px) { .masonry { column-count: 2; } }
        @media (max-width: 600px) { .masonry { column-count: 1; } .hero-title { font-size: 2.5rem; } }

        .card { 
            break-inside: avoid; margin-bottom: 25px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; overflow: hidden; transition: var(--transition); position: relative;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }
        .card-body { padding: 20px; }
        .card-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--secondary); font-weight: 700; margin-bottom: 10px; display: block; }
        .card-title { font-size: 1.25rem; margin-bottom: 12px; color: var(--text-main); }
        .card-excerpt { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-dim); }
        .card-link { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* 项目展示 */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .project-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 25px; transition: var(--transition); }
        .project-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 0, 222, 0.1); }
        .project-icon { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }

        /* 搜索 & 标签云 */
        .search-area { margin: 40px 0; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 250px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
                        padding: 12px 20px; border-radius: 30px; color: white; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-item { padding: 5px 12px; background: rgba(255,255,255,0.05); border-radius: 15px; font-size: 0.8rem; cursor: pointer; transition: var(--transition); }
        .tag-item:hover { background: rgba(0, 242, 255, 0.1); color: var(--primary); }

        /* 底部 */
        footer { padding: 60px 0; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 60px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-link { color: var(--text-dim); text-decoration: none; transition: var(--transition); }
        .footer-link:hover { color: var(--primary); }

        /* 进度条 & 主题切换 */
        #progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--primary); z-index: 1001; transition: width 0.1s; }
        .theme-toggle { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; 
                        background: var(--primary); color: var(--bg-dark); display: flex; align-items: center; justify-content: center; 
                        cursor: pointer; z-index: 1000; box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>
    <div id="progress"></div>
    <div class="cyber-bg"></div>
    
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">MAVIPROJECT</a>
                <ul class="nav-links">
                    <li class="nav-item">
                        <a href="#articles" class="nav-link">文章 <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i></a>
                        <div class="dropdown">
                            <a href="/yolo/">YOLO 系列</a>
                            <a href="/detection/">目标检测</a>
                            <a href="/llama/">Llama 2</a>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a href="#projects" class="nav-link">项目 <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i></a>
                        <div class="dropdown">
                            <a href="https://github.com/MaviProject" target="_blank">CV 工具箱</a>
                            <a href="https://github.com/MaviProject" target="_blank">目标检测实践</a>
                        </div>
                    </li>
                    <li><a href="/About/" class="nav-link">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 class="hero-title">MAVI PROJECT</h1>
            <p class="hero-desc">探索计算机视觉、AI 模型部署与前沿算法的数字化空间。构建智能，连接未来。</p>
        </section>

        <section class="tech-section">
            <div class="tech-grid" id="techGrid">
                <!-- 由 JS 填充 -->
            </div>
        </section>

        <section class="search-area">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索关键词、标签或分类...">
            <div class="tag-cloud" id="tagCloud">
                <!-- 由 JS 填充 -->
            </div>
        </section>

        <section id="articles">
            <h2 class="section-title"><i class="fas fa-microchip"></i> 最新发布</h2>
            <div class="masonry" id="articleGrid">
                <!-- 由 JS 填充 -->
            </div>
        </section>

        <section id="projects" style="padding: 60px 0;">
            <h2 class="section-title"><i class="fas fa-project-diagram"></i> 开源项目</h2>
            <div class="project-grid" id="projectGrid">
                <!-- 由 JS 填充 -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="https://github.com/MaviProject" class="footer-link">GITHUB</a>
            <a href="/feed.xml" class="footer-link">RSS</a>
            <a href="mailto:contact@mavi.project" class="footer-link">EMAIL</a>
        </div>
        <p style="color: var(--text-dim); font-size: 0.8rem;">&copy; 2026 MaviProject. Built with Future Tech.</p>
    </footer>

    <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>

    <script>
        // 1. 数据注入 (Jekyll Liquid)
        const articles = [
            {% for collection in site.collections %}
              {% if collection.label != "posts" %}
                {% for doc in collection.docs %}
                {
                    title: "{{ doc.title | escape }}",
                    category: "{{ doc.category | escape }}",
                    excerpt: "{{ doc.content | strip_html | truncatewords: 20 | escape }}",
                    link: "{{ doc.url }}",
                    tags: {{ doc.tags | jsonify }},
                    date: "{{ doc.date | date: '%Y-%m-%d' }}",
                    readTime: "{{ doc.content | strip_html | number_of_words | divided_by: 200 | plus: 1 }} min"
                }{% unless forloop.last and forloop.parentloop.last %},{% endunless %}
                {% endfor %}
              {% endif %}
            {% endfor %}
        ];

        const techStack = [
            { name: "Python", icon: "fab fa-python" },
            { name: "PyTorch", icon: "fas fa-brain" },
            { name: "YOLO", icon: "fas fa-eye" },
            { name: "TensorRT", icon: "fas fa-rocket" },
            { name: "OpenCV", icon: "fas fa-camera" },
            { name: "Llama2", icon: "fas fa-language" },
            { name: "Docker", icon: "fab fa-docker" },
            { name: "CUDA", icon: "fas fa-microchip" }
        ];

        const projects = [
            { title: "CV 工具箱", desc: "常用计算机视觉工具函数与预处理脚本集锦。", icon: "fas fa-tools", link: "https://github.com/MaviProject" },
            { title: "目标检测实践", desc: "YOLO 系列模型的训练、优化与多端部署方案。", icon: "fas fa-eye", link: "https://github.com/MaviProject" }
        ];

        // 2. 渲染函数
        function renderArticles(data) {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = data.map(a => `
                <article class="card">
                    <div class="card-body">
                        <span class="card-tag">${a.category}</span>
                        <h3 class="card-title">${a.title}</h3>
                        <p class="card-excerpt">${a.excerpt}</p>
                        <div class="card-footer">
                            <span>${a.date} · ${a.readTime}</span>
                            <a href="${a.link}" class="card-link">阅读全文 <i class="fas fa-arrow-right"></i></a>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function renderTech() {
            document.getElementById('techGrid').innerHTML = techStack.map(t => `
                <div class="tech-tag"><i class="${t.icon}"></i> ${t.name}</div>
            `).join('');
        }

        function renderProjects() {
            document.getElementById('projectGrid').innerHTML = projects.map(p => `
                <div class="project-card">
                    <i class="${p.icon} project-icon"></i>
                    <h3 class="card-title">${p.title}</h3>
                    <p class="card-excerpt">${p.desc}</p>
                    <a href="${p.link}" class="card-link" target="_blank">View on GitHub</a>
                </div>
            `).join('');
        }

        function renderTags() {
            const allTags = [...new Set(articles.flatMap(a => a.tags))];
            document.getElementById('tagCloud').innerHTML = allTags.map(t => `
                <span class="tag-item" onclick="filterByTag('${t}')">#${t}</span>
            `).join('');
        }

        // 3. 交互逻辑
        function filterByTag(tag) {
            document.getElementById('searchInput').value = tag;
            handleSearch();
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = articles.filter(a => 
                a.title.toLowerCase().includes(query) || 
                a.category.toLowerCase().includes(query) ||
                a.tags.some(t => t.toLowerCase().includes(query))
            );
            renderArticles(filtered);
        }

        // 4. 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderArticles(articles);
            renderTech();
            renderProjects();
            renderTags();

            document.getElementById('searchInput').addEventListener('input', handleSearch);

            // 进度条
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                document.getElementById("progress").style.width = scrolled + "%";
            });

            // 主题切换
            const toggle = document.getElementById('themeToggle');
            toggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const target = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', target);
                toggle.innerHTML = target === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            });
        });
    </script>
</body>
</html>

---
layout: null
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVI_NEURAL_INTERFACE | V2.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --neon-pink: #ff007a;
            --matrix-green: #00ff41;
            --deep-black: #030303;
            --panel-bg: rgba(5, 5, 10, 0.8);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body {
            background-color: var(--deep-black);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* -----------------------------------------
           极致科幻背景：Three.js 风格动态网格 + 扫描线
        ----------------------------------------- */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.02) 50%);
            background-size: 100% 4px; z-index: 1000; pointer-events: none; opacity: 0.3;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, black 150%);
            z-index: 999; pointer-events: none;
        }

        /* -----------------------------------------
           HUD 布局：全屏数字界面
        ----------------------------------------- */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-areas: 
                "tl top tr"
                "lt main rt"
                "bl bot br";
            grid-template-columns: 80px 1fr 80px;
            grid-template-rows: 80px 1fr 80px;
            pointer-events: none;
            z-index: 10;
        }
        .hud-corner { border: 2px solid var(--neon-blue); width: 30px; height: 30px; pointer-events: none; }
        .hud-tl { grid-area: tl; border-right: none; border-bottom: none; margin: 20px; }
        .hud-tr { grid-area: tr; border-left: none; border-bottom: none; margin: 20px; justify-self: end; }
        .hud-bl { grid-area: bl; border-right: none; border-top: none; margin: 20px; align-self: end; }
        .hud-br { grid-area: br; border-left: none; border-top: none; margin: 20px; align-self: end; justify-self: end; }

        /* -----------------------------------------
           内容区域：滚动视口
        ----------------------------------------- */
        .viewport {
            position: relative; width: 100%; height: 100vh; overflow-y: auto;
            scroll-behavior: smooth; z-index: 5; padding: 100px 120px;
            scrollbar-width: none;
        }
        .viewport::-webkit-scrollbar { display: none; }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 100px; border-left: 4px solid var(--neon-blue); padding-left: 30px;
        }
        .brand {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900;
            letter-spacing: 10px; color: var(--neon-blue); text-shadow: var(--border-glow);
        }
        .status-panel { text-align: right; font-size: 0.7rem; color: var(--neon-purple); letter-spacing: 2px; }

        /* -----------------------------------------
           Hero: 震撼视觉中心
        ----------------------------------------- */
        .hero { margin-bottom: 150px; }
        .glitch-text {
            font-family: 'Orbitron', sans-serif; font-size: 6rem; line-height: 0.9;
            text-transform: uppercase; font-weight: 900; position: relative;
        }
        .glitch-text span { color: transparent; -webkit-text-stroke: 1px var(--neon-blue); }

        /* -----------------------------------------
           核心组件：神经节点 (Tech Stack)
        ----------------------------------------- */
        .node-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 100px;
        }
        .tech-node {
            background: var(--panel-bg); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 20px; position: relative; overflow: hidden; pointer-events: auto;
            transition: 0.3s;
        }
        .tech-node:hover {
            border-color: var(--neon-blue); box-shadow: var(--border-glow);
            transform: translateY(-5px); background: rgba(0, 242, 255, 0.1);
        }
        .tech-node::before {
            content: 'DATA_NODE'; position: absolute; top: 5px; right: 5px; font-size: 0.5rem; color: var(--neon-blue); opacity: 0.5;
        }

        /* -----------------------------------------
           文章数据日志 (Data Logs)
        ----------------------------------------- */
        .logs-section { pointer-events: auto; }
        .log-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        @media (max-width: 1000px) { .log-grid { grid-template-columns: 1fr; } }

        .log-entry {
            background: rgba(255,255,255,0.02); border-left: 2px solid var(--neon-purple);
            padding: 30px; position: relative; transition: 0.4s;
        }
        .log-entry:hover {
            background: rgba(112, 0, 255, 0.05); border-left-color: var(--neon-pink);
            transform: scale(1.02);
        }
        .log-entry .cat { font-size: 0.6rem; color: var(--neon-pink); letter-spacing: 3px; margin-bottom: 10px; display: block; }
        .log-entry h3 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 2px; }
        .log-entry p { font-size: 0.85rem; color: #aaa; line-height: 1.6; margin-bottom: 25px; }
        .entry-link {
            display: inline-block; padding: 10px 25px; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); text-decoration: none; font-size: 0.7rem; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s;
        }
        .entry-link:hover { background: var(--neon-blue); color: #000; box-shadow: var(--border-glow); }

        /* -----------------------------------------
           互动元素
        ----------------------------------------- */
        .search-hud {
            margin: 50px 0; border: 1px solid rgba(0, 242, 255, 0.1); padding: 10px 30px;
            background: rgba(0, 242, 255, 0.02); pointer-events: auto;
        }
        .search-hud input {
            width: 100%; background: transparent; border: none; color: var(--neon-blue);
            font-family: 'JetBrains Mono'; font-size: 1.2rem; outline: none; padding: 15px 0;
        }

        /* -----------------------------------------
           页脚
        ----------------------------------------- */
        footer {
            margin-top: 150px; border-top: 1px solid rgba(255,255,255,0.1);
            padding: 50px 0; display: flex; justify-content: space-between; align-items: center;
        }
        .footer-logo { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--neon-purple); }

    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <!-- HUD装饰层 -->
    <div class="hud-overlay">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
    </div>

    <!-- 主视口 -->
    <div class="viewport">
        <header>
            <div>
                <div class="brand">MAVI_01</div>
                <div style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.5;">DEEP_LEARNING_INTERFACE_V2.5</div>
            </div>
            <div class="status-panel">
                CORE_TEMP: 32°C<br>
                UPLINK_STATUS: ACTIVE<br>
                SYSTEM_MODE: NEURAL_LOGS
            </div>
        </header>

        <section class="hero">
            <div class="glitch-text">
                NEURAL<br><span>BEYOND</span><br>LIMITS
            </div>
        </section>

        <section class="node-container" id="techNodes">
            <!-- 自动填充 -->
        </section>

        <div class="search-hud">
            <input type="text" id="searchInput" placeholder=">> SEARCH_DATABASE_QUERY_">
        </div>

        <section class="logs-section">
            <div style="margin-bottom: 40px; border-bottom: 1px solid var(--neon-purple); display: flex; justify-content: space-between;">
                <span style="font-family: 'Orbitron'; letter-spacing: 5px;">DATABASE_LOGS</span>
                <span id="logCount" style="color: var(--neon-pink);">[00]</span>
            </div>
            <div class="log-grid" id="logGrid">
                <!-- 自动填充 -->
            </div>
        </section>

        <footer>
            <div class="footer-logo">MAVI_PROJECT_SYSTEM</div>
            <div style="display: flex; gap: 30px; font-size: 0.7rem;">
                <a href="https://github.com/MaviProject" style="color: var(--neon-blue); text-decoration: none;">GITHUB_LINK</a>
                <a href="/feed.xml" style="color: var(--neon-blue); text-decoration: none;">RSS_FEED</a>
            </div>
        </footer>
    </div>

    <!-- 核心渲染库：使用 CDN 加载 Three.js 构建更科幻的 3D 背景 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. 三维背景渲染器 (Three.js)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // x
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // y
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // z
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f2ff, size: 2, transparent: true, opacity: 0.5 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 500;
        function animate() {
            requestAnimationFrame(animate);
            points.rotation.x += 0.0005;
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 2. 数据层 (Jekyll Liquid)
        const articles = [
            {% assign all_docs = "" | split: "" %}
            {% for collection in site.collections %}
                {% if collection.label != "posts" %}
                    {% assign all_docs = all_docs | concat: collection.docs %}
                {% endif %}
            {% endfor %}
            {% for doc in all_docs %}
            {
                title: "{{ doc.title | escape }}",
                category: "{{ doc.category | escape }}",
                excerpt: "{{ doc.content | strip_html | truncate: 150 | escape }}",
                link: "{{ doc.url }}",
                tags: {{ doc.tags | jsonify }},
                date: "{{ doc.date | date: '%Y.%m.%d' }}"
            }{% unless forloop.last %},{% endunless %}
            {% endfor %}
        ];

        const techStack = [
            { name: "PYTHON_ENV", icon: "fab fa-python" },
            { name: "PYTORCH_CORE", icon: "fas fa-brain" },
            { name: "YOLO_RESEARCH", icon: "fas fa-eye" },
            { name: "TENSORRT_ACC", icon: "fas fa-bolt" },
            { name: "OPENCV_LIB", icon: "fas fa-microchip" },
            { name: "LLM_NEURAL", icon: "fas fa-network-wired" }
        ];

        // 3. 渲染逻辑
        function renderLogs(data) {
            const grid = document.getElementById('logGrid');
            const countEl = document.getElementById('logCount');
            countEl.innerText = `[${data.length.toString().padStart(2, '0')}]`;
            
            grid.innerHTML = data.map(a => `
                <div class="log-entry">
                    <span class="cat">${a.category.toUpperCase()} // DATA_ENTRY</span>
                    <h3>${a.title}</h3>
                    <p>${a.excerpt}</p>
                    <a href="${a.link}" class="entry-link">ESTABLISH_UPLINK_</a>
                </div>
            `).join('');
        }

        function renderTech() {
            document.getElementById('techNodes').innerHTML = techStack.map(t => `
                <div class="tech-node">
                    <i class="${t.icon}" style="color:var(--neon-blue); font-size:1.5rem; margin-bottom:10px; display:block;"></i>
                    <div style="font-size:0.8rem; font-weight:bold;">${t.name}</div>
                    <div style="font-size:0.5rem; opacity:0.5; margin-top:5px;">STATUS: STABLE</div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = articles.filter(a => 
                a.title.toLowerCase().includes(q) || 
                a.category.toLowerCase().includes(q)
            );
            renderLogs(filtered);
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderTech();
            renderLogs(articles);
        });
    </script>
</body>
</html>

---
layout: null
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>目标检测文章汇总 | MaviProject</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 50px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #8b5cf6; border-bottom: 2px solid #8b5cf6; padding-bottom: 10px; }
        .post-item { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .post-title { font-size: 1.4rem; color: #06b6d4; text-decoration: none; display: block; margin-bottom: 10px; }
        .post-meta { font-size: 0.9rem; color: #94a3b8; }
        .back-home { display: inline-block; margin-bottom: 20px; color: #8b5cf6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <h1>目标检测文章汇总</h1>
        {% for doc in site.detection %}
        <div class="post-item">
            <a href="{{ doc.url }}" class="post-title">{{ doc.title }}</a>
            <div class="post-meta">分类: {{ doc.category }} | 阅读预计: {{ doc.content | strip_html | number_of_words | divided_by: 200 | plus: 1 }} 分钟</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
